<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Sanatana Sangam — App Icon Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    padding: 40px 20px;
    font-family: -apple-system, sans-serif;
    color: #d4a818;
  }
  h1 { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; }
  .row { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; justify-content: center; }
  .size-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .size-label { font-size: 11px; opacity: 0.4; letter-spacing: 1px; }
  img { border-radius: calc(var(--r) * 1px); }
</style>
</head>
<body>
<h1>Sanatana Sangam · App Icon</h1>
<div class="row">
  <div class="size-wrap">
    <img src="sanatana-sangam-icon.svg" width="180" height="180" style="border-radius:40px" alt="icon"/>
    <span class="size-label">180 × 180 — iOS</span>
  </div>
  <div class="size-wrap">
    <img src="sanatana-sangam-icon.svg" width="128" height="128" style="border-radius:28px" alt="icon"/>
    <span class="size-label">128 × 128</span>
  </div>
  <div class="size-wrap">
    <img src="sanatana-sangam-icon.svg" width="72" height="72" style="border-radius:16px" alt="icon"/>
    <span class="size-label">72 × 72</span>
  </div>
  <div class="size-wrap">
    <img src="sanatana-sangam-icon.svg" width="48" height="48" style="border-radius:11px" alt="icon"/>
    <span class="size-label">48 × 48</span>
  </div>
  <div class="size-wrap">
    <img src="sanatana-sangam-icon.svg" width="32" height="32" style="border-radius:7px" alt="icon"/>
    <span class="size-label">32 × 32</span>
  </div>
</div>
<p style="font-size:11px;opacity:0.3;letter-spacing:2px;margin-top:20px">SVG · Scales to any size · Open in browser to render</p>
</body>
</html>
